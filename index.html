<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Ninja — Werocket</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }

    /* ── Vidéo de fond ── en dehors du game-container, derrière tout ── */
    #bg-video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.6s ease;
      z-index: 0;
    }
    #bg-video.visible { opacity: 1; }

    /* Trame sombre par-dessus la vidéo */
    #bg-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 8, 0.55);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.6s ease;
      z-index: 1;
    }
    #bg-overlay.visible { opacity: 1; }

    /* ── Game container ── par-dessus la vidéo ── */
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      z-index: 2;
    }

    /* Webcam en filigrane, miroir horizontal */
    #webcam-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0.15;
      transform: scaleX(-1);
      pointer-events: none;
      object-fit: cover;
      z-index: 2;
    }

    /* Canvas 2D pour le trail du doigt */
    #slice-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    /* ── Boutons de contrôle (son + fullscreen) ── */
    #ui-controls {
      position: fixed;
      bottom: 50px;
      right: 50px;
      display: flex;
      gap: 30px;
      z-index: 1000;
    }
    #ui-controls button {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      opacity: 0.80;
      transition: opacity 0.15s, transform 0.15s;
      line-height: 0;
    }
    #ui-controls button:hover  { opacity: 1; transform: scale(1.12); }
    #ui-controls button:active { transform: scale(0.93); }
    #ui-controls img { width: 42px; height: 42px; display: block; }
  </style>
</head>
<body>
  <!-- Musique de fond — démarrée via JS après geste utilisateur -->
  <audio id="bg-music" loop>
    <source src="assets/audio/nr-gaming-zone.mp3" type="audio/mpeg">
  </audio>

  <!-- Vidéo de fond — AVANT game-container, z-index inférieur -->
  <video id="bg-video" autoplay loop muted playsinline>
    <source src="assets/bg/nr-bghome.mp4" type="video/mp4">
  </video>
  <div id="bg-overlay"></div>

  <!-- Boutons de contrôle — par-dessus tout, persistants entre scènes -->
  <div id="ui-controls">
    <button id="btn-sound"      title="Son">
      <img id="btn-sound-img" src="assets/ui/nr-btnsound.png" alt="Son">
    </button>
    <button id="btn-fullscreen" title="Plein écran">
      <img id="btn-fullscreen-img" src="assets/ui/nr-fullscreen.png" alt="Plein écran">
    </button>
  </div>

  <div id="game-container">
    <video id="webcam-overlay" autoplay playsinline muted></video>
    <!-- Phaser injecte son canvas ici -->
    <canvas id="slice-canvas"></canvas>
  </div>

  <!-- Phaser 3.60 — CDN jsDelivr -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

  <!-- MediaPipe Hands 0.4 + Camera Utils -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>

  <script type="module" src="src/main.js"></script>
</body>
</html>
